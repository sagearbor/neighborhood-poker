<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d1a;
    color: #ffffff;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    transition: background 0.15s, color 0.15s;
    user-select: none;
  }

  body.flash-white { background: #ffffff; color: #000000; }
  body.flash-black { background: #000000; color: #ffffff; }

  #level-label {
    font-size: 1.3em;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 8px;
  }

  #blinds {
    font-size: 3.8em;
    font-weight: bold;
    margin-bottom: 10px;
  }

  #timer {
    font-size: 5em;
    font-weight: bold;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    font-variant-numeric: tabular-nums;
    font-family: monospace;
  }

  #next-info {
    font-size: 1em;
    opacity: 0.6;
    margin-bottom: 28px;
    min-height: 1.4em;
  }

  #alert-message {
    font-size: 1.6em;
    font-weight: bold;
    color: #ffcc00;
    margin-bottom: 18px;
    min-height: 2em;
    text-align: center;
    animation: pulse 0.6s infinite alternate;
  }

  @keyframes pulse {
    from { opacity: 1; }
    to   { opacity: 0.3; }
  }

  .btn-row {
    display: flex;
    gap: 16px;
  }

  button {
    padding: 14px 32px;
    font-size: 1.1em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 0.05em;
  }

  #btn-pause     { background: #3a8ef6; color: #fff; }
  #btn-next      { background: #27ae60; color: #fff; }
  #btn-snooze    { background: #e67e22; color: #fff; display: none; }

  button:hover { opacity: 0.85; }

  #progress-bar-wrap {
    width: 80%;
    max-width: 600px;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    margin-bottom: 20px;
  }
  #progress-bar {
    height: 100%;
    background: #3a8ef6;
    border-radius: 3px;
    transition: width 1s linear;
  }
</style>
</head>
<body>

<div id="level-label">Level 1</div>
<div id="blinds">— / —</div>
<div id="timer">20:00</div>
<div id="progress-bar-wrap"><div id="progress-bar" style="width:100%"></div></div>
<div id="next-info">Next: —</div>
<div id="alert-message"></div>

<div class="btn-row">
  <button id="btn-pause"  onclick="togglePause()">⏸ Pause</button>
  <button id="btn-snooze" onclick="snooze()">+2 min</button>
  <button id="btn-next"   onclick="nextLevel()">Next Level ⏭</button>
</div>

<script>
// ── Data injected from Apps Script ──────────────────────────────────────────
var LEVELS = <?= levelsJson ?>;

// ── State ────────────────────────────────────────────────────────────────────
var currentIndex = 0;
var totalSeconds = 0;
var remainingSeconds = 0;
var paused = false;
var alerting = false;
var flashInterval = null;
var tickInterval = null;

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  if (!LEVELS || LEVELS.length === 0) {
    document.getElementById('alert-message').textContent = 'No levels found!';
    return;
  }
  loadLevel(0);
  startTick();
}

function loadLevel(idx) {
  stopFlash();
  alerting = false;
  document.getElementById('alert-message').textContent = '';
  document.getElementById('btn-snooze').style.display = 'none';
  document.body.className = '';

  currentIndex = idx;
  var lvl = LEVELS[idx];
  totalSeconds = lvl.duration * 60;
  remainingSeconds = totalSeconds;

  // Label
  var label = lvl.isBreak ? '☕ BREAK' : 'LEVEL ' + (idx + 1);
  // Count non-break levels for display
  document.getElementById('level-label').textContent = label;

  // Blinds
  if (lvl.isBreak) {
    document.getElementById('blinds').textContent = lvl.label || 'BREAK';
  } else {
    document.getElementById('blinds').textContent = lvl.sb + ' / ' + lvl.bb;
  }

  updateTimerDisplay();
  updateProgress();
  updateNextInfo();
}

function updateTimerDisplay() {
  var m = Math.floor(remainingSeconds / 60);
  var s = remainingSeconds % 60;
  document.getElementById('timer').textContent =
    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function updateProgress() {
  var pct = totalSeconds > 0 ? (remainingSeconds / totalSeconds) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updateNextInfo() {
  var next = LEVELS[currentIndex + 1];
  if (!next) {
    document.getElementById('next-info').textContent = 'Final level';
    return;
  }
  if (next.isBreak) {
    document.getElementById('next-info').textContent = 'Next: BREAK (' + next.duration + ' min)';
  } else {
    document.getElementById('next-info').textContent =
      'Next: ' + next.sb + ' / ' + next.bb;
  }
}

// ── Tick ─────────────────────────────────────────────────────────────────────
function startTick() {
  clearInterval(tickInterval);
  tickInterval = setInterval(function() {
    if (paused || alerting) return;
    if (remainingSeconds > 0) {
      remainingSeconds--;
      updateTimerDisplay();
      updateProgress();
    } else {
      triggerAlert();
    }
  }, 1000);
}

// ── Alert / Flash ─────────────────────────────────────────────────────────────
function triggerAlert() {
  alerting = true;
  document.getElementById('alert-message').textContent = '⏰ TIME! Move to next level';
  document.getElementById('btn-snooze').style.display = 'inline-block';
  startFlash();
  try { beep(); } catch(e) {}
}

function startFlash() {
  var dark = false;
  flashInterval = setInterval(function() {
    dark = !dark;
    document.body.className = dark ? 'flash-black' : 'flash-white';
  }, 400);
}

function stopFlash() {
  clearInterval(flashInterval);
  flashInterval = null;
  document.body.className = '';
}

function beep() {
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  for (var i = 0; i < 3; i++) {
    (function(delay) {
      setTimeout(function() {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      }, delay);
    })(i * 500);
  }
}

// ── Button actions ────────────────────────────────────────────────────────────
function togglePause() {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '▶ Resume' : '⏸ Pause';
}

function nextLevel() {
  stopFlash();
  if (currentIndex + 1 >= LEVELS.length) {
    document.getElementById('level-label').textContent = '🏆 TOURNAMENT COMPLETE';
    document.getElementById('blinds').textContent = '';
    document.getElementById('timer').textContent = '—';
    document.getElementById('next-info').textContent = '';
    document.getElementById('alert-message').textContent = 'Good game everyone!';
    clearInterval(tickInterval);
    return;
  }
  loadLevel(currentIndex + 1);
}

function snooze() {
  alerting = false;
  stopFlash();
  remainingSeconds = 120;
  totalSeconds = 120;
  document.getElementById('alert-message').textContent = '';
  document.getElementById('btn-snooze').style.display = 'none';
  updateTimerDisplay();
  updateProgress();
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
