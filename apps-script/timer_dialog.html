<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d1a;
    color: #ffffff;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    transition: background 0.15s, color 0.15s;
    user-select: none;
  }

  body.flash-white { background: #ffffff; color: #000000; }
  body.flash-black { background: #000000; color: #ffffff; }

  #level-label {
    font-size: 1.3em;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 8px;
  }

  #blinds {
    font-size: 3.8em;
    font-weight: bold;
    margin-bottom: 10px;
  }

  #timer {
    font-size: 5em;
    font-weight: bold;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    font-variant-numeric: tabular-nums;
    font-family: monospace;
  }

  #next-info {
    font-size: 1em;
    opacity: 0.6;
    margin-bottom: 28px;
    min-height: 1.4em;
  }

  #alert-message {
    font-size: 1.6em;
    font-weight: bold;
    color: #ffcc00;
    margin-bottom: 18px;
    min-height: 2em;
    text-align: center;
    animation: pulse 0.6s infinite alternate;
  }

  @keyframes pulse {
    from { opacity: 1; }
    to   { opacity: 0.3; }
  }

  .btn-row {
    display: flex;
    gap: 16px;
  }

  button {
    padding: 14px 32px;
    font-size: 1.1em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 0.05em;
  }

  #btn-pause     { background: #3a8ef6; color: #fff; }
  #btn-next      { background: #27ae60; color: #fff; }
  #btn-snooze    { background: #e67e22; color: #fff; display: none; }

  button:hover { opacity: 0.85; }

  #progress-bar-wrap {
    width: 80%;
    max-width: 600px;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    margin-bottom: 20px;
  }
  #progress-bar {
    height: 100%;
    background: #3a8ef6;
    border-radius: 3px;
    transition: width 1s linear;
  }
</style>
</head>
<body>

<div style="display:flex; align-items:center; gap:8px; margin-bottom:6px; opacity:0.6; font-size:0.85em;">
  🕐 Start time: <input id="start-time" type="time" value="18:00"
    style="background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.3); color:inherit; font-size:1em; width:80px;"
    onchange="updateStartTime()">
  <span id="end-time-display"></span>
</div>
<div id="level-label">Level 1</div>
<div id="blinds">— / —</div>
<div id="timer">20:00</div>
<div id="progress-bar-wrap"><div id="progress-bar" style="width:100%"></div></div>
<div id="next-info">Next: —</div>
<div id="alert-message"></div>

<div class="btn-row">
  <button id="btn-pause"  onclick="togglePause()">⏸ Pause</button>
  <button id="btn-next"   onclick="nextLevel()">Next Level ⏭</button>
</div>

<div id="edit-time-row" style="display:none; margin-top:16px; align-items:center; gap:10px; flex-direction:column;">
  <div style="opacity:0.7; font-size:0.9em;">⏸ PAUSED — edit time if needed</div>
  <div style="display:flex; gap:10px; align-items:center;">
    <input id="time-edit" type="text" placeholder="MM:SS or minutes"
      style="width:120px; font-size:1.4em; text-align:center; padding:8px; border-radius:6px; border:none; background:#1e2a3a; color:#fff; font-family:monospace;"
      onkeydown="if(event.key==='Enter') applyTimeEdit()">
    <button onclick="applyTimeEdit()" style="padding:10px 20px; font-size:1em; background:#3a8ef6; color:#fff; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Set</button>
  </div>
  <div style="opacity:0.5; font-size:0.8em;">e.g. "5" for 5 min, "7:30" for 7m 30s</div>
</div>

<script>
// ── Data injected from Apps Script ──────────────────────────────────────────
var LEVELS = <?!= levelsJson ?>;

// ── State ────────────────────────────────────────────────────────────────────
var currentIndex = 0;
var totalSeconds = 0;
var remainingSeconds = 0;
var paused = false;
var alerting = false;
var flashInterval = null;
var tickInterval = null;

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  if (!LEVELS || LEVELS.length === 0) {
    document.getElementById('alert-message').textContent = 'No levels found!';
    return;
  }
  loadLevel(0);
  startTick();
}

function loadLevel(idx) {
  stopFlash();
  alerting = false;
  document.getElementById('alert-message').textContent = '';
  
  document.body.className = '';

  currentIndex = idx;
  var lvl = LEVELS[idx];
  var dur = (lvl.duration && lvl.duration > 0) ? lvl.duration : 20;
  totalSeconds = dur * 60;
  remainingSeconds = totalSeconds;

  // Label
  var label = lvl.isBreak ? '☕ BREAK' : 'LEVEL ' + (idx + 1);
  // Count non-break levels for display
  document.getElementById('level-label').textContent = label;

  // Blinds
  if (lvl.isBreak) {
    document.getElementById('blinds').textContent = lvl.label || 'BREAK';
  } else {
    document.getElementById('blinds').textContent = lvl.smallBlind + ' / ' + lvl.bigBlind;
  }

  updateTimerDisplay();
  updateProgress();
  updateNextInfo();
}

function updateTimerDisplay() {
  var m = Math.floor(remainingSeconds / 60);
  var s = remainingSeconds % 60;
  document.getElementById('timer').textContent =
    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function updateProgress() {
  var pct = totalSeconds > 0 ? (remainingSeconds / totalSeconds) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updateNextInfo() {
  var next = LEVELS[currentIndex + 1];
  if (!next) {
    document.getElementById('next-info').textContent = 'Final level';
    return;
  }
  if (next.isBreak) {
    document.getElementById('next-info').textContent = 'Next: BREAK (' + next.duration + ' min)';
  } else {
    document.getElementById('next-info').textContent =
      'Next: ' + next.smallBlind + ' / ' + next.bigBlind;
  }
}

// ── Tick ─────────────────────────────────────────────────────────────────────
function startTick() {
  clearInterval(tickInterval);
  tickInterval = setInterval(function() {
    if (paused || alerting) return;
    if (remainingSeconds > 0) {
      remainingSeconds--;
      updateTimerDisplay();
      updateProgress();
    } else {
      triggerAlert();
    }
  }, 1000);
}

// ── Alert / Flash ─────────────────────────────────────────────────────────────
function triggerAlert() {
  alerting = true;
  document.getElementById('alert-message').textContent = '⏰ TIME! Move to next level';
  togglePause(); // auto-pause on alert
  startFlash();
  try { beep(); } catch(e) {}
}

function startFlash() {
  var dark = false;
  flashInterval = setInterval(function() {
    dark = !dark;
    document.body.className = dark ? 'flash-black' : 'flash-white';
  }, 400);
}

function stopFlash() {
  clearInterval(flashInterval);
  flashInterval = null;
  document.body.className = '';
}

function beep() {
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  for (var i = 0; i < 3; i++) {
    (function(delay) {
      setTimeout(function() {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      }, delay);
    })(i * 500);
  }
}

// ── Button actions ────────────────────────────────────────────────────────────
function togglePause() {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '▶ Resume' : '⏸ Pause';
  document.getElementById('edit-time-row').style.display = paused ? 'flex' : 'none';
}

function nextLevel() {
  stopFlash();
  if (currentIndex + 1 >= LEVELS.length) {
    document.getElementById('level-label').textContent = '🏆 TOURNAMENT COMPLETE';
    document.getElementById('blinds').textContent = '';
    document.getElementById('timer').textContent = '—';
    document.getElementById('next-info').textContent = '';
    document.getElementById('alert-message').textContent = 'Good game everyone!';
    clearInterval(tickInterval);
    return;
  }
  loadLevel(currentIndex + 1);
}

function snooze() {
  alerting = false;
  stopFlash();
  remainingSeconds = 120;
  totalSeconds = 120;
  document.getElementById('alert-message').textContent = '';
  
  updateTimerDisplay();
  updateProgress();
}

// ── Edit timer when paused ───────────────────────────────────────────────────
function applyTimeEdit() {
  var val = document.getElementById('time-edit').value.trim();
  var secs = 0;
  if (val.indexOf(':') !== -1) {
    var parts = val.split(':');
    secs = parseInt(parts[0]) * 60 + parseInt(parts[1]);
  } else {
    secs = parseInt(val) * 60;
  }
  if (!isNaN(secs) && secs > 0) {
    remainingSeconds = secs;
    totalSeconds = secs;
    updateTimerDisplay();
    updateProgress();
    document.getElementById('time-edit').value = '';
  }
}

// ── Start time + predicted end ────────────────────────────────────────────────
var startMinutes = 18 * 60; // default 6:00 PM

function updateStartTime() {
  var val = document.getElementById('start-time').value;
  var parts = val.split(':');
  startMinutes = parseInt(parts[0]) * 60 + parseInt(parts[1]);
  updateEndTimeDisplay();
}

function updateEndTimeDisplay() {
  var elapsed = 0;
  for (var i = 0; i <= currentIndex; i++) {
    elapsed += LEVELS[i].duration;
  }
  var remaining = Math.ceil(remainingSeconds / 60);
  var totalElapsed = elapsed - LEVELS[currentIndex].duration + (LEVELS[currentIndex].duration - remaining);
  
  // Calculate when tournament is scheduled to end
  var totalMins = 0;
  for (var i = 0; i < LEVELS.length; i++) totalMins += LEVELS[i].duration;
  var endMin = startMinutes + totalMins;
  var endH = Math.floor(endMin / 60) % 24;
  var endM = endMin % 60;
  var ampm = endH >= 12 ? 'PM' : 'AM';
  var h12 = endH > 12 ? endH - 12 : (endH === 0 ? 12 : endH);
  document.getElementById('end-time-display').textContent =
    'Est. end: ' + h12 + ':' + String(endM).padStart(2,'0') + ' ' + ampm;
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
updateEndTimeDisplay();
</script>
</body>
</html>
